name: CI Build & Test

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build test container
        run: ./scripts/ensure-test-container.sh
        env:
          DOCKER_BUILDKIT: 1

      - name: Compile
        run: mvn compile test-compile -T 2 --no-transfer-progress

      - name: Run unit tests
        run: mvn test -T 2 --no-transfer-progress

      - name: Eval harness gate
        run: bash ./scripts/run-eval-harness.sh

      - name: Eval pass rate IT
        run: mvn test -Dtest=EvaluationServicePassRateIT -T 2 --no-transfer-progress

      - name: Run integration tests
        run: mvn verify -T 2 --no-transfer-progress

      - name: Generate coverage report
        if: always()
        run: mvn jacoco:report --no-transfer-progress

      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco/
          retention-days: 7

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 3
