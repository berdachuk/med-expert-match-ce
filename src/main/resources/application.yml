# MedExpertMatch default configuration (no profile, or base for profile-specific overrides).
#
# OpenAI-compatible AI — env vars map to spring.ai.custom.* :
#   CLINICAL_*  T3 harness / case analysis     default model medgemma1.5:4b
#   UTILITY_*   T2 classify / translate        default model qwen3.5:4b
#   TOOL_CALLING_*  T1 agent tools             default model functiongemma:270m
#   EMBEDDING_* GraphRAG vectors               default model nomic-embed-text:v1.5 (768 dims)
#   RERANKING_* semantic rerank                default model qwen3.5:4b (falls back to UTILITY_*)
#   CHAT_*      legacy fallback → clinical
# All roles may share one base URL (e.g. http://HOST:11434/v1). See docs/MODEL_SELECTION_GUIDE.md.
# Optional embedding pool: medexpertmatch.embedding.multi-endpoint (same model + dims on every node).
# Override datasource with MEDEXPERTMATCH_DB_* or SPRING_DATASOURCE_*.

# Turn-safe short-term memory (Spring AI Session). Compaction fires when EITHER threshold is crossed.
agent:
  session:
    max-turns: ${AGENT_SESSION_MAX_TURNS:20}        # turn-count compaction trigger
    max-tokens: ${AGENT_SESSION_MAX_TOKENS:4000}    # estimated-token compaction trigger
    max-window-turns: ${AGENT_SESSION_MAX_WINDOW_TURNS:30}  # turns kept by the non-LLM window strategy
  memory: # Long-term (cross-session) AutoMemory. NON-PHI ONLY (PhiGuard rejects PHI-shaped content).
    dir: ${AGENT_MEMORY_DIR:${user.home}/.spring-ai-agent/medexpertmatch/memory}
    consolidation:
      gap-seconds: ${AGENT_MEMORY_CONSOLIDATION_GAP_SECONDS:60}  # idle gap that triggers consolidation
      # max-turns / probability are optional nice-to-have triggers (unset = disabled)

spring:
  config:
    import: optional:classpath:policy/medical-confidence-policy.yml
  application:
    name: med-expert-match
    version: 1.0.0
  # Custom beans in SpringAIConfig; disable Spring AI auto-config to avoid duplicate models
  autoconfigure:
    exclude:
      - org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageModelAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
  datasource:
    # Override via MEDEXPERTMATCH_DB_URL, MEDEXPERTMATCH_DB_USERNAME, MEDEXPERTMATCH_DB_PASSWORD (or SPRING_DATASOURCE_*)
    url: ${MEDEXPERTMATCH_DB_URL:jdbc:postgresql://localhost:5433/medexpertmatch}
    username: ${MEDEXPERTMATCH_DB_USERNAME:medexpertmatch}
    password: ${MEDEXPERTMATCH_DB_PASSWORD:medexpertmatch}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_MS:10000}
      connection-init-sql: SET search_path = public, medexpertmatch;
  jdbc:
    template:
      fetch-size: 100
  jackson:
    time-zone: UTC
  messages:
    basename: i18n/messages
    encoding: UTF-8
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    enabled: true
    schemas: medexpertmatch
    default-schema: medexpertmatch
  ai:
    session:
      repository:
        jdbc:
          initialize-schema: never
    openai:
      enabled: false
    # OpenAI-compatible providers only; base-url must include /v1 for Ollama (M6 official SDK)
    custom:
      chat: # Legacy alias; clinical/utility roles fall back here when unset (M67)
        provider: ${CHAT_PROVIDER:openai}
        base-url: ${CHAT_BASE_URL:http://localhost:11434/v1}
        api-key: ${CHAT_API_KEY:none}
        model: ${CHAT_MODEL:medgemma1.5:4b}
        temperature: ${CHAT_TEMPERATURE:0.7}
        max-tokens: ${CHAT_MAX_TOKENS:6000}
      clinical: # T3 harness analyze/interpret; falls back to chat.*
        provider: ${CLINICAL_PROVIDER:${CHAT_PROVIDER:openai}}
        base-url: ${CLINICAL_BASE_URL:${CHAT_BASE_URL:http://localhost:11434/v1}}
        api-key: ${CLINICAL_API_KEY:${CHAT_API_KEY:none}}
        model: ${CLINICAL_MODEL:${CHAT_MODEL:medgemma1.5:4b}}
        temperature: ${CLINICAL_TEMPERATURE:${CHAT_TEMPERATURE:0.7}}
        max-tokens: ${CLINICAL_MAX_TOKENS:${CHAT_MAX_TOKENS:6000}}
      utility: # T2 classify/translate/summarize; same URL as clinical, different model
        provider: ${UTILITY_PROVIDER:${RERANKING_PROVIDER:${CHAT_PROVIDER:openai}}}
        base-url: ${UTILITY_BASE_URL:${RERANKING_BASE_URL:${CHAT_BASE_URL:http://localhost:11434/v1}}}
        api-key: ${UTILITY_API_KEY:${RERANKING_API_KEY:${CHAT_API_KEY:none}}}
        model: ${UTILITY_MODEL:qwen3.5:4b}
        temperature: ${UTILITY_TEMPERATURE:${RERANKING_TEMPERATURE:0.1}}
        max-tokens: ${UTILITY_MAX_TOKENS:4096}
      embedding: # GraphRAG vectors; use Ollama tag (nomic-embed-text:v1.5), not LM Studio names
        provider: ${EMBEDDING_PROVIDER:openai}
        base-url: ${EMBEDDING_BASE_URL:http://localhost:11434/v1}
        api-key: ${EMBEDDING_API_KEY:none}
        model: ${EMBEDDING_MODEL:nomic-embed-text:v1.5}
        dimensions: ${EMBEDDING_DIMENSIONS:768}
      reranking: # Semantic reranking; same URL + utility model by default
        provider: ${RERANKING_PROVIDER:${UTILITY_PROVIDER:${CHAT_PROVIDER:openai}}}
        base-url: ${RERANKING_BASE_URL:${UTILITY_BASE_URL:${CHAT_BASE_URL:http://localhost:11434/v1}}}
        api-key: ${RERANKING_API_KEY:${UTILITY_API_KEY:${CHAT_API_KEY:none}}}
        model: ${RERANKING_MODEL:${UTILITY_MODEL:qwen3.5:4b}}
        temperature: ${RERANKING_TEMPERATURE:0.1}
      tool-calling: # T1 agent tools; FunctionGemma recommended (see docs/FUNCTIONGEMMA.md)
        provider: ${TOOL_CALLING_PROVIDER:openai}
        base-url: ${TOOL_CALLING_BASE_URL:http://localhost:11434/v1}
        api-key: ${TOOL_CALLING_API_KEY:none}
        model: ${TOOL_CALLING_MODEL:functiongemma:270m}
        temperature: ${TOOL_CALLING_TEMPERATURE:0.7}
        max-tokens: ${TOOL_CALLING_MAX_TOKENS:4096}
    vectorstore: # PgVector; HNSW + cosine for similarity search
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
  lifecycle:
    timeout-per-shutdown-phase: 30s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  max-http-request-header-size: 8KB
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,application/json,application/problem+json
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always
  # Optional (e.g. LAN access or long LLM requests); same knobs as aist-expertmatch local profile:
  # address: 0.0.0.0
  # connection-timeout: 300000
  # tomcat:
  #   connection-timeout: 300000
  #   keep-alive-timeout: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api/v1/openapi.json
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: false

# Application-specific settings
medexpertmatch:
  docs:
    # MkDocs dev server URL when static/docs is not embedded (local mvn spring-boot:run)
    dev-url: ${MEDEXPERTMATCH_DOCS_DEV_URL:http://localhost:8000}
  features:
    document-ingestion: ${MEDEXPERTMATCH_FEATURES_DOCUMENT_INGESTION:true}
    graph-rag: ${MEDEXPERTMATCH_FEATURES_GRAPH_RAG:true}
    agent-skills: ${MEDEXPERTMATCH_FEATURES_AGENT_SKILLS:true}
    evaluation: ${MEDEXPERTMATCH_FEATURES_EVALUATION:true}
    semantic-reranking: ${MEDEXPERTMATCH_FEATURES_SEMANTIC_RERANKING:true}
  skills: # Agent skills (SKILL.md); set enabled: false to use plain ChatClient
    enabled: ${MEDEXPERTMATCH_SKILLS_ENABLED:true}
    directory: ${MEDEXPERTMATCH_SKILLS_DIRECTORY:skills}
    extra-directory: ${MEDEXPERTMATCH_SKILLS_EXTRA_DIRECTORY:}
  embedding:
    # Multi-endpoint pool (optional): same pattern as aist-expertmatch ingestion embeddings multi-endpoint.
    # Activates when endpoints[0].url is set. All nodes use spring.ai.custom.embedding api-key and dimensions.
    multi-endpoint:
      endpoints: []
      # Example (uncomment; every node must use the same model + EMBEDDING_DIMENSIONS):
      # endpoints:
      #   - url: http://127.0.0.1:11434/v1
      #     model: nomic-embed-text:v1.5
      #     priority: 1
      #   - url: http://192.168.0.73:11434/v1
      #     model: nomic-embed-text:v1.5
      #     priority: 2
      # Do not mix qwen3-embedding:* — different vector dimensions than nomic 768.
      skip-duration-min: ${MEDEXPERTMATCH_EMBEDDING_MULTI_ENDPOINT_SKIP_MIN:10}
      worker-per-endpoint: ${MEDEXPERTMATCH_EMBEDDING_MULTI_ENDPOINT_WORKERS:1}
      api-batch-size: ${MEDEXPERTMATCH_EMBEDDING_MULTI_ENDPOINT_API_BATCH_SIZE:50}
  retrieval: # Hybrid GraphRAG: vector + graph + keyword
    vector:
      max-results: 100
      similarity-threshold: 0.7
    graph:
      max-depth: 3
    scoring:
      doctor:
        vector-weight: ${MEDEXPERTMATCH_RETRIEVAL_DOCTOR_VECTOR_WEIGHT:0.4}
        graph-weight: ${MEDEXPERTMATCH_RETRIEVAL_DOCTOR_GRAPH_WEIGHT:0.3}
        historical-weight: ${MEDEXPERTMATCH_RETRIEVAL_DOCTOR_HISTORICAL_WEIGHT:0.3}
      facility:
        complexity-weight: ${MEDEXPERTMATCH_RETRIEVAL_FACILITY_COMPLEXITY_WEIGHT:0.3}
        historical-weight: ${MEDEXPERTMATCH_RETRIEVAL_FACILITY_HISTORICAL_WEIGHT:0.3}
        capacity-weight: ${MEDEXPERTMATCH_RETRIEVAL_FACILITY_CAPACITY_WEIGHT:0.2}
        geographic-weight: ${MEDEXPERTMATCH_RETRIEVAL_FACILITY_GEOGRAPHIC_WEIGHT:0.2}
      priority:
        urgency-weight: ${MEDEXPERTMATCH_RETRIEVAL_PRIORITY_URGENCY_WEIGHT:0.5}
        complexity-weight: ${MEDEXPERTMATCH_RETRIEVAL_PRIORITY_COMPLEXITY_WEIGHT:0.3}
        availability-weight: ${MEDEXPERTMATCH_RETRIEVAL_PRIORITY_AVAILABILITY_WEIGHT:0.2}
    reranking:
      enabled: ${MEDEXPERTMATCH_RETRIEVAL_RERANKING_ENABLED:true}
      top-k: ${MEDEXPERTMATCH_RETRIEVAL_RERANKING_TOP_K:20}
  llm: # Concurrency per component; 1 = sequential (safe for local Ollama), increase for remote APIs
    max-tokens: 4096
    temperature: 0.7
    response: # M74: server-side rendering of LLM response (embedded-JSON → prose)
      render-embedded-json: ${MEDEXPERTMATCH_LLM_RESPONSE_RENDER_EMBEDDED_JSON:true}
    chat: # Deprecated alias for clinical limit (M67)
      max-concurrent-calls: ${MEDEXPERTMATCH_LLM_CHAT_MAX_CONCURRENT_CALLS:1}
    clinical:
      max-concurrent-calls: ${MEDEXPERTMATCH_LLM_CLINICAL_MAX_CONCURRENT_CALLS:${MEDEXPERTMATCH_LLM_CHAT_MAX_CONCURRENT_CALLS:1}}
    utility:
      max-concurrent-calls: ${MEDEXPERTMATCH_LLM_UTILITY_MAX_CONCURRENT_CALLS:2}
    embedding:
      max-concurrent-calls: ${MEDEXPERTMATCH_LLM_EMBEDDING_MAX_CONCURRENT_CALLS:1}
    reranking:
      max-concurrent-calls: ${MEDEXPERTMATCH_LLM_RERANKING_MAX_CONCURRENT_CALLS:1}
    tool-calling:
      max-concurrent-calls: ${MEDEXPERTMATCH_LLM_TOOL_CALLING_MAX_CONCURRENT_CALLS:1}
    acquire-timeout-seconds: ${MEDEXPERTMATCH_LLM_ACQUIRE_TIMEOUT_SECONDS:120}
    tier:
      light:
        max-tokens: ${MEDEXPERTMATCH_LLM_TIER_LIGHT_MAX_TOKENS:2048}
      standard:
        max-tokens: ${MEDEXPERTMATCH_LLM_TIER_STANDARD_MAX_TOKENS:4096}
      full:
        max-tokens: ${MEDEXPERTMATCH_LLM_TIER_FULL_MAX_TOKENS:6000}
    harness:
      policy-gate-enabled: ${MEDEXPERTMATCH_LLM_HARNESS_POLICY_GATE_ENABLED:true}
      policy-gate-chat-enabled: ${MEDEXPERTMATCH_LLM_HARNESS_POLICY_GATE_CHAT_ENABLED:true}
      max-iterations: ${MEDEXPERTMATCH_LLM_HARNESS_MAX_ITERATIONS:2}
      retry-on-verify-fail: ${MEDEXPERTMATCH_LLM_HARNESS_RETRY_ON_VERIFY_FAIL:true}
      doctor-match-min-matches: ${MEDEXPERTMATCH_LLM_HARNESS_DOCTOR_MATCH_MIN_MATCHES:1}
      routing-match-min-matches: ${MEDEXPERTMATCH_LLM_HARNESS_ROUTING_MATCH_MIN_MATCHES:0}
      human-checkpoint-enabled: ${MEDEXPERTMATCH_LLM_HARNESS_HUMAN_CHECKPOINT_ENABLED:false}
      human-adjudication-enabled: ${MEDEXPERTMATCH_LLM_HARNESS_HUMAN_ADJUDICATION_ENABLED:false}
      chain-analysis-to-match: ${MEDEXPERTMATCH_LLM_HARNESS_CHAIN_ANALYSIS_TO_MATCH:false}
      chain-match-to-recommend: ${MEDEXPERTMATCH_LLM_HARNESS_CHAIN_MATCH_TO_RECOMMEND:false}
      zero-result-fallback-enabled: ${MEDEXPERTMATCH_LLM_HARNESS_ZERO_RESULT_FALLBACK_ENABLED:false}
      analyze-case-harness-enabled: ${MEDEXPERTMATCH_LLM_HARNESS_ANALYZE_CASE_ENABLED:true}
      retention:
        enabled: ${MEDEXPERTMATCH_LLM_HARNESS_RETENTION_ENABLED:false}
        retention-days: ${MEDEXPERTMATCH_LLM_HARNESS_RETENTION_DAYS:90}
        batch-size: ${MEDEXPERTMATCH_LLM_HARNESS_RETENTION_BATCH_SIZE:100}
        cron: ${MEDEXPERTMATCH_LLM_HARNESS_RETENTION_CRON:0 0 3 * * ?}
  synthetic-data: # Test data generation; batch sizes and timeouts
    embedding:
      thread-pool-size: ${SYNTHETIC_DATA_EMBEDDING_THREAD_POOL_SIZE:10}
    description:
      thread-pool-size: ${SYNTHETIC_DATA_DESCRIPTION_THREAD_POOL_SIZE:5}
      batch-commit-size: ${SYNTHETIC_DATA_DESCRIPTION_BATCH_COMMIT_SIZE:100}
    llm:
      timeout-seconds: ${SYNTHETIC_DATA_LLM_TIMEOUT_SECONDS:300}
      max-tokens: ${SYNTHETIC_DATA_DESCRIPTION_LLM_MAX_TOKENS:1024}
    batch-size: ${SYNTHETIC_DATA_BATCH_SIZE:5000}
    progress-update-interval: ${SYNTHETIC_DATA_PROGRESS_UPDATE_INTERVAL:100}
    max-doctors-per-batch: ${SYNTHETIC_DATA_MAX_DOCTORS_PER_BATCH:100000}
    max-cases-per-batch: ${SYNTHETIC_DATA_MAX_CASES_PER_BATCH:1000000}
    data-files:
      medical-specialties: classpath:/data/medical-specialties.csv
      icd10-codes: classpath:/data/icd10-codes.csv
      procedures: classpath:/data/procedures.csv
      facility-types: classpath:/data/facility-types.csv
      complexity-levels: classpath:/data/complexity-levels.csv
      outcomes: classpath:/data/outcomes.csv
      availability-statuses: classpath:/data/availability-statuses.csv
      severities: classpath:/data/severities.csv
      symptoms: classpath:/data/symptoms.csv
      encounter-classes: classpath:/data/encounter-classes.csv
      encounter-types: classpath:/data/encounter-types.csv
      complications: classpath:/data/complications.csv
      facility-capabilities: classpath:/data/facility-capabilities.csv
      specialty-procedures: classpath:/data/specialty-procedures.csv
  evaluation:
    dataset: ${MEDEXPERTMATCH_EVALUATION_DATASET:medical-eval-v1}
    semantic-threshold: ${MEDEXPERTMATCH_EVALUATION_SEMANTIC_THRESHOLD:0.80}
  documents:
    enabled: ${MEDEXPERTMATCH_DOCUMENTS_ENABLED:true}
    ingestion:
      directory: ${MEDEXPERTMATCH_DOCUMENTS_INGESTION_DIRECTORY:}
    chunking:
      default-strategy: ${MEDEXPERTMATCH_DOCUMENTS_CHUNKING_STRATEGY:adaptive}
      chunk-size: ${MEDEXPERTMATCH_DOCUMENTS_CHUNK_SIZE:512}
      chunk-overlap: ${MEDEXPERTMATCH_DOCUMENTS_CHUNK_OVERLAP:64}
    backfill:
      enabled: ${MEDEXPERTMATCH_DOCUMENTS_BACKFILL_ENABLED:true}
      cron: ${MEDEXPERTMATCH_DOCUMENTS_BACKFILL_CRON:0 0 2 * * *}
  auth:
    enabled: ${MEDEXPERTMATCH_AUTH_ENABLED:true}
    api-keys: ${MEDEXPERTMATCH_AUTH_API_KEYS:}
    session-tokens:
      enabled: ${MEDEXPERTMATCH_SESSION_TOKEN_AUTH:false}
  system:
    graph-quality:
      stale-experience-days: ${MEDEXPERTMATCH_GRAPH_QUALITY_STALE_EXPERIENCE_DAYS:365}
      evidence-freshness-ttl-days: ${MEDEXPERTMATCH_EVIDENCE_FRESHNESS_TTL_DAYS:180}

chat:
  retention:
    idle-days: ${CHAT_RETENTION_IDLE_DAYS:0}
    batch-size: ${CHAT_RETENTION_BATCH_SIZE:100}
    cron: ${CHAT_RETENTION_CRON:0 0 3 * * *}

logging:
  level:
    com.berdachuk.medexpertmatch: INFO
    com.berdachuk.medexpertmatch.embedding: INFO
    com.berdachuk.medexpertmatch.embedding.multiendpoint: INFO
    com.berdachuk.medexpertmatch.embedding.config: INFO
    org.springframework.web.client.RestClient: INFO
    org.springframework.ai.openai: INFO
    org.springframework.http.client: INFO
    org.springframework.ai.chat.client: INFO
    org.springframework.ai.chat.client.advisor: INFO
    org.springaicommunity.agent.tools: INFO
    org.springaicommunity.agent: INFO
    org.springframework.ai: INFO
    org.springframework.web: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

