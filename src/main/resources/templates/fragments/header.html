<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="header">
    <script th:inline="javascript">
        (function () {
            try {
                var stored = window.localStorage && window.localStorage.getItem('medexpertmatch-selected-user');
                if (!stored) return;
                var user = JSON.parse(stored);
                var isAdmin = user.roles && user.roles.indexOf('ROLE_ADMIN') !== -1;
                var url = new URL(window.location.href);
                var urlUser = url.searchParams.get('user');
                if (isAdmin && urlUser !== 'admin') {
                    url.searchParams.set('user', 'admin');
                    window.location.replace(url.toString());
                    return;
                }
                if (!isAdmin && urlUser === 'admin') {
                    url.searchParams.delete('user');
                    window.location.replace(url.toString());
                }
            } catch (e) {
            }
        })();
    </script>
    <nav class="navbar navbar-expand-lg navbar-dark py-2 px-4" style="background-color: #1a5490;" role="navigation" aria-label="Main navigation">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-4">
                <button class="btn btn-outline-light btn-sm chat-sidebar-mobile" id="chatSidebarToggleBtn"
                        th:if="${currentPage == 'chat'}" type="button"
                        aria-label="Toggle chat list">
                    <span aria-hidden="true">&#9776;</span>
                </button>
                <a class="text-white text-decoration-none" style="color: #FFFFFF !important;"
                   th:href="@{/}" th:if="${currentPage != 'chat' and !isAdmin}" aria-label="Back to home">
                    <i class="bi bi-arrow-left" aria-hidden="true"></i>
                </a>
                <a class="text-white text-decoration-none" style="color: #FFFFFF !important;"
                   th:href="@{/(user=admin)}" th:if="${currentPage != 'chat' and isAdmin}" aria-label="Back to admin home">
                    <i class="bi bi-arrow-left" aria-hidden="true"></i>
                </a>
                <div class="d-flex align-items-center">
                    <div class="ms-3">
                        <h1 class="h5 mb-0 fw-bold text-white" style="color: #FFFFFF !important;" th:text="#{app.name}">MedExpertMatch</h1>
                        <p class="small mb-0 text-white d-none d-md-inline" style="color: #FFFFFF !important;" th:text="#{app.subtitle}">Medical Expert Recommendation System</p>
                    </div>
                </div>
            </div>
            <button aria-controls="navbarMainCollapse" aria-expanded="false" aria-label="Toggle navigation"
                    class="navbar-toggler border-light" data-bs-target="#navbarMainCollapse" data-bs-toggle="collapse"
                    type="button">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMainCollapse">
                <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2 gap-lg-3 py-3 py-lg-0 ms-lg-auto">
                    <a class="text-white text-decoration-none" th:classappend="${currentPage == 'chat'} ? 'fw-bold'"
                       th:href="@{/}" th:if="${!isAdmin}" th:text="#{nav.home}">AI Chat</a>
                    <a class="text-white text-decoration-none" th:classappend="${currentPage == 'chat'} ? 'fw-bold'"
                       th:href="@{/(user=admin)}" th:if="${isAdmin}" th:text="#{nav.home}">AI Chat</a>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.find_specialist}" th:href="@{/match}" th:if="${currentPage != 'match'}" th:text="#{nav.find_specialist}">Find Specialist</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${currentPage == 'match'}" th:text="#{nav.find_specialist}">Find Specialist</span>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.case_analysis}" th:href="@{/analyze}" th:if="${currentPage != 'analyze'}" th:text="#{nav.case_analysis}">Case Analysis</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${currentPage == 'analyze'}" th:text="#{nav.case_analysis}">Case Analysis</span>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.queue}" th:href="@{/queue}" th:if="${currentPage != 'queue'}" th:text="#{nav.queue}">Queue</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${currentPage == 'queue'}" th:text="#{nav.queue}">Queue</span>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.analytics}" th:href="@{/analytics}"
                       th:if="${currentPage != 'analytics'}" th:text="#{nav.analytics}">Analytics</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${currentPage == 'analytics'}" th:text="#{nav.analytics}">Analytics</span>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.routing}" th:href="@{/routing}" th:if="${currentPage != 'routing'}" th:text="#{nav.routing}">Routing</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${currentPage == 'routing'}" th:text="#{nav.routing}">Routing</span>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.synthetic_data}" th:href="@{/admin/synthetic-data(user=admin)}"
                       th:if="${isAdmin and currentPage != 'synthetic-data'}" th:text="#{nav.synthetic_data}">Synthetic Data</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${isAdmin and currentPage == 'synthetic-data'}" th:text="#{nav.synthetic_data}">Synthetic Data</span>
                    <a class="text-white text-decoration-none" th:aria-label="#{nav.graph}" th:href="@{/admin/graph-visualization(user=admin)}"
                       th:if="${isAdmin and currentPage != 'graph-visualization'}" th:text="#{nav.graph}">Graph</a>
                    <span aria-current="page" class="text-white text-decoration-none fw-bold"
                          th:if="${isAdmin and currentPage == 'graph-visualization'}" th:text="#{nav.graph}">Graph</span>
                    <a class="btn btn-outline-light btn-sm" href="/docs"
                       rel="noopener noreferrer"
                       target="_blank" th:aria-label="#{nav.docs}" th:title="#{nav.docs}">
                        <i aria-hidden="true" class="bi bi-journal-text"></i>
                    </a>
                    <div class="dropdown">
                        <button aria-expanded="false" aria-label="User selector" class="btn btn-outline-light btn-sm dropdown-toggle"
                                data-bs-toggle="dropdown"
                                id="userSelectorBtn" type="button">
                            <span id="currentUserDisplay" th:text="#{nav.user}">Regular User</span>
                        </button>
                        <ul aria-labelledby="userSelectorBtn" class="dropdown-menu dropdown-menu-end" role="menu"
                            id="userSelectorMenu">
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <script th:src="@{/js/main.js}"></script>
</th:block>
</body>
</html>
