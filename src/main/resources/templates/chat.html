<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title th:text="#{nav.chat}">AI Chat</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container-fluid p-0" style="min-height: calc(100vh - 120px);">
    <div class="row g-0 h-100">
        <div class="col-md-3 col-lg-2 border-end">
            <div th:replace="~{fragments/chat-sidebar :: chat-sidebar}"></div>
        </div>
        <div class="col-md-9 col-lg-7 d-flex flex-column border-end">
            <div class="flex-grow-1 overflow-auto p-3" id="messagePanel">
                <div th:if="${messages == null or messages.isEmpty()}" class="text-muted" id="chatEmptyState" th:text="#{chat.empty}">
                    Start a conversation…
                </div>
                <div th:each="msg : ${messages}" class="mb-3 chat-message-row">
                    <div th:class="${msg.role() == 'user'} ? 'text-end' : 'text-start'">
                        <span class="badge mb-1" th:classappend="${msg.role() == 'user'} ? 'bg-primary' : 'bg-secondary'"
                              th:text="${msg.role()}">role</span>
                        <div th:if="${msg.role() == 'user'}"
                             class="p-2 rounded d-inline-block text-start bg-primary-subtle"
                             th:text="${msg.content()}">message</div>
                        <div th:if="${msg.role() != 'user'}"
                             class="p-2 rounded d-inline-block text-start bg-light border chat-markdown"
                             th:utext="${msg.renderedHtml()}"></div>
                    </div>
                </div>
            </div>
            <div class="border-top p-3 bg-white">
                <div class="alert alert-info alert-dismissible fade show d-none mb-2 py-2 small" id="lifecycleToast" role="alert">
                    <span id="lifecycleToastMessage"></span>
                    <button class="btn-close btn-close-sm" data-bs-dismiss="alert" type="button"></button>
                </div>
                <input id="currentUserId" th:value="${currentUserId}" type="hidden"/>
                <div class="d-none small border rounded p-2 mb-2 bg-light" id="agentTodoPanel"></div>
                <div class="d-none small border rounded p-2 mb-2 bg-warning-subtle" id="agentQuestionPanel"></div>
                <div id="agentActivitySummary" class="d-none small border rounded p-2 mb-2 bg-light" role="button" tabindex="0" aria-expanded="false"></div>
                <form id="chatMessageForm" class="d-flex gap-2 align-items-end">
                    <input id="currentChatId" th:value="${currentChat.id()}" type="hidden"/>
                    <select aria-label="Agent" class="form-select form-select-sm" id="agentPicker" style="max-width: 11rem;">
                        <option th:selected="${currentChat.agentId() == 'auto'}" value="auto" th:text="#{chat.agent.auto}">Auto</option>
                        <option value="triage-intake" th:text="#{chat.agent.triage}">Triage</option>
                        <option value="case-analyzer" th:text="#{chat.agent.case_analyzer}">Case Analyzer</option>
                        <option value="evidence-scout" th:text="#{chat.agent.evidence}">Evidence</option>
                        <option value="specialist-matcher" th:text="#{chat.agent.matcher}">Matcher</option>
                        <option value="routing-planner" th:text="#{chat.agent.routing}">Routing</option>
                        <option value="network-analyst" th:text="#{chat.agent.network}">Network</option>
                    </select>
                    <textarea class="form-control" id="messageInput" placeholder="Ask a clinical question…" rows="2"></textarea>
                    <button class="btn btn-primary" id="sendBtn" th:text="#{chat.send}" type="submit">Send</button>
                </form>
            </div>
        </div>
        <div class="col-lg-3 d-none d-lg-flex flex-column bg-body-tertiary border-start">
            <div class="p-2 border-bottom small fw-semibold">Agents</div>
            <div class="flex-grow-1 overflow-auto p-2 small" id="agentActivityPanel" aria-live="polite">
                <div class="text-muted">Agent activity will appear here when you send a message.</div>
            </div>
        </div>
    </div>
</main>
<div aria-hidden="true" class="modal fade" id="deleteAllDataModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete all chat data?</h5>
                <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                This soft-deletes all messages and removes non-default chats. This cannot be undone.
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteAllDataBtn" type="button">Delete All</button>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<link rel="stylesheet" th:href="@{/css/chat.css}"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/chat.js}"></script>
</body>
</html>
