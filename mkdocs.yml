site_name: MedExpertMatch Documentation
site_description: MedExpertMatch - AI-Powered Medical Expert Recommendation System for MedGemma Impact Challenge
site_author: Siarhei Berdachuk
site_url: https://medexpertmatch.berdachuk.com

# Repository
repo_name: med-expert-match
repo_url: https://github.com/berdachuk/med-expert-match-ce
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 Siarhei Berdachuk

# Theme (colors aligned with application: primary #1a5490, hover #144375)
theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      lang: en
  # Mermaid2 plugin: finds <pre class="mermaid"> blocks (produced by the
  # pymdownx.superfences custom_fences below), converts to <div class="mermaid">
  # and inlines the mermaid.js loader script. Renders in any modern browser.
  - mermaid2
  # Browser presentations: Markdown + Reveal.js (see docs/presentations/)
  - revealjs:
      transition: slide
      controls: true
      progress: true
      mermaid:
        activate: true

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
      cachedir: .plantuml-cache
      format: svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

# Navigation
nav:
  - Home: index.md
  - Presentations:
      - Overview: presentations/index.md
      - Harness (how it works): presentations/medexpertmatch-harness.md
      - Video (1 slide): presentations/medexpertmatch-video-one-slide.md
      - Sales pitch (~3 min): presentations/medexpertmatch-sales-3min.md
      - Full talk (45 min, English): presentations/medexpertmatch-full-presentation.md
      - Full talk speaker script (RU): presentations/medexpertmatch-full-presentation-speaker-ru.md
  - Overview:
      - Vision: VISION.md
      - MedExpertMatch Overview: MedExpertMatch.md
      - Use Cases: use-cases.md
      - Problems Solved: PROBLEMS_SOLVED.md
      - Target Audience: TARGET_AUDIENCE.md
      - Benefits: BENEFITS.md
      - Unique Selling Propositions: UNIQUE_SELLING_PROPOSITIONS.md
      - Sales Copy (Pain-Solution): SALES_COPY_PAIN_SOLUTION.md
  - Features:
      - Find Specialist Flow: FIND_SPECIALIST_FLOW.md
      - Consultation Queue: CONSULTATION_QUEUE.md
      - Network Analytics: NETWORK_ANALYTICS.md
      - Regional Routing: ROUTING.md
      - Evidence Retrieval: EVIDENCE_RETRIEVAL.md
      - Medical Agent Tools: MEDICAL_AGENT_TOOLS.md
  - AI & LLM:
      - Agent Skills (Spring AI): ai/spring-ai-agent-skills-medical.md
      - Harness Architecture: HARNESS.md
      - FunctionGemma Tool Calling: FUNCTIONGEMMA.md
      - Harness & Agent Patterns: HARNESS_AND_AGENT_USAGE.md
  - Architecture:
      - Integration Plan: INTEGRATION_PLAN.md
      - Diagrams:
          - Data Flow Architecture: architecture/diagrams/data-flow-architecture.md
          - Expert Matching Sequence: architecture/diagrams/expert-matching-sequence.md
  - Development pipeline:
      - Pipeline index: pipeline/00-index.md
      - Requirements (SRS): pipeline/01-requirements.md
      - Architecture (SAD): pipeline/02-architecture.md
      - Design (SDD): pipeline/03-design.md
      - Testing (Test plan): pipeline/04-testing.md
      - Deployment (Ops guide): pipeline/05-deployment.md
  - Development:
      - Fix Plan: FIX_PLAN.md
      - Implementation Plan: IMPLEMENTATION_PLAN.md
      - Demo Guide: DEMO_GUIDE.md
      - UI Flows and Mockups: UI_FLOWS_AND_MOCKUPS.md
      - Development Guide: DEVELOPMENT_GUIDE.md
      - Coding Rules: CODING_RULES.md
      - List Formatting Guide: LIST_FORMATTING_GUIDE.md
      - MkDocs Setup: MKDOCS_SETUP.md
      - PlantUML Usage: PLANTUML_USAGE.md
  - Configuration:
      - AI Provider Configuration: AI_PROVIDER_CONFIGURATION.md
      - Model Selection Guide: MODEL_SELECTION_GUIDE.md
      - MedGemma Configuration: MEDGEMMA_CONFIGURATION.md
      - MedGemma Setup Guide: MEDGEMMA_SETUP.md
      - Docker Service (Ubuntu): DOCKER_SERVICE_UBUNTU.md


# Extra
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/berdachuk/med-expert-match-ce
  analytics:
    provider: google
    property: G-XXXXXXXXXX

# Custom CSS for full-width content
extra_css:
  - stylesheets/extra.css

# Custom JavaScript for navigation toggles
extra_javascript:
  - javascripts/navigation-toggle.js
